name: Design System CI

on:
  push:
    branches: [main]
    paths: ['design-system/**']
  pull_request:
    paths: ['design-system/**']

jobs:
  tokens-and-checks:
    name: Build tokens · Contrast · Docs
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: design-system

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: design-system/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build tokens
        run: npm run build-tokens

      - name: Check WCAG contrast
        run: npm run check-contrast

      - name: Generate token docs
        run: npm run generate-docs

  storybook:
    name: Build Storybook
    runs-on: ubuntu-latest
    needs: tokens-and-checks
    defaults:
      run:
        working-directory: design-system

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: design-system/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Storybook
        run: npm run build-storybook
